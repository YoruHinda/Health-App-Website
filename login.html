<!DOCTYPE html>
<html>
<head>
    <title>Login - HealthApp</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(180deg, #020617, #0f172a);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #111827;
            padding: 40px;
            border-radius: 12px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            margin-bottom: 20px;
            color: #22c55e;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: #1f2937;
            color: white;
        }

        input:focus {
            outline: 1px solid #22c55e;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #22c55e;
            color: black;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        #result {
            margin-top: 15px;
            color: #94a3b8;
        }

        .back {
            margin-top: 15px;
            font-size: 12px;
            cursor: pointer;
            color: #94a3b8;
        }

        .back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>🔐 HealthApp</h2>

    <input type="text" id="username" placeholder="Usuário">
    <input type="text" id="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <p id="result"></p>

    <div class="back" onclick="goBack()">← Voltar</div>
</div>

<script>
function login() {
    const u = document.getElementById("username").value;
    const p = document.getElementById("password").value;

    fetch(`http://localhost:8080/login?username=${u}&password=${p}`)
        .then(res => res.text())
        .then(data => {
            document.getElementById("result").innerText = data;

            if (data.includes("sucesso")) {
                window.location.href = "dashboard.html";
            }
        });
}

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
